name: morning-snapshot
on:
  schedule:
    - cron: "15 14 * * 1-5"   # ~10:15 ET weekdays (EDT); UTC-only — drifts 1h at DST
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Verify Turso credentials
        run: |
          test -n "$TURSO_DATABASE_URL" || { echo "::error::TURSO_DATABASE_URL repo secret is missing — see deploy/INSTALL.md"; exit 1; }
          test -n "$TURSO_AUTH_TOKEN" || { echo "::error::TURSO_AUTH_TOKEN repo secret is missing — see deploy/INSTALL.md"; exit 1; }
      - name: Morning spot₀ snapshot (equity only)
        run: PYTHONPATH=src python -m gexwheel morning-snapshot
