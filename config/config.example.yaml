# gexwheel configuration. Copy to config.yaml (mounted at /data/config.yaml in container).
db_path: /data/gexwheel.db

data:
  chain_source: yfinance         # 'yfinance' now; 'polygon' interface stubbed for later
  polygon_api_key: ""
  max_dte: 60                    # only expirations within N days feed the GEX profile
  risk_free_rate: 0.045
  request_sleep_s: 1.5           # throttle between yfinance calls (avoid bans)
  request_retries: 3

reddit:
  source: apewisdom              # 'apewisdom' | 'praw' | 'both' (ApeWisdom first, PRAW fallback)
  apewisdom_filter: wallstreetbets   # also: 'all', 'stocks', 'options'
  apewisdom_pages: 2             # ~100 tickers per page
  praw:                          # needed if source == praw or source == both fallback should work
    client_id: ""
    client_secret: ""
    user_agent: "gexwheel/0.1"

discovery:                       # Stage 1 - cast wide
  velocity_trigger: 3.0          # today >= 3x trailing-7d average
  baseline_floor: 10             # trailing avg must be >= 10 mentions/day
  min_history_days: 5            # need at least this many days of history
  max_daily_mentions: 1000       # ignore permanent meme residents above this baseline

screen:                          # periodic primary-watchlist screen
  primary_screen_interval_days: 21
  screen_pages: 5                # wider ApeWisdom pull than daily apewisdom_pages
  avg_volume_days: 20            # window for the average-daily-volume gate
  min_avg_volume: 1000000        # NEW gate: avg daily shares

filters:                         # Stage 2 - hard gate, no overrides
  price_min: 10.0
  price_max: 45.0                # collateral fit for ~$26k account; raise as account grows
  min_open_interest: 1000        # near-the-money strikes
  max_spread_pct: 0.05           # bid-ask / mid on ATM options
  min_iv_rank: 50.0
  min_vrp: 0.0                   # IV must exceed 20d realized vol
  require_above_50dma: true
  earnings_blackout_days: 7
  excluded_sectors: ["Biotechnology"]   # no-binary-catalyst rule
  excluded_symbols: []           # manual blocklist
  require_positive_regime: false # if true, only alert in positive net gamma

alerts:
  put_wall_proximity_pct: 0.03   # alert when spot within 3% of put wall
  wall_persistence_days: 2       # wall must hold same strike N consecutive days
  cooldown_days: 5               # bench ticker after spot closes below its put wall

timezone: America/New_York
